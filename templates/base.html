<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}TechStock{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold fs-4" href="{{ url_for('listar') }}">
      <i class="bi bi-box-seam-fill me-2 text-primary"></i>TechStock
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto align-items-center gap-2">
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('listar') }}">
            <i class="bi bi-table me-1"></i>Inventario
          </a>
        </li>
        <li class="nav-item">
          <a class="btn btn-primary fw-bold" href="{{ url_for('registrar') }}">
            <i class="bi bi-plus-circle me-1"></i>Nuevo Producto
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- Contenido -->
<main class="container py-4">
  {% block content %}{% endblock %}
</main>

<!-- Footer -->
<footer class="bg-dark text-white text-center py-3 mt-4">
  <small>© 2025 TechStock · Gestión de Inventario</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
