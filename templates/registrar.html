{% extends "base.html" %}
{% block title %}Nuevo Producto · TechStock{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-8 col-lg-6">
    <div class="card shadow border-0">
      <div class="card-header bg-primary text-white fs-5 fw-bold">
        <i class="bi bi-plus-circle me-2"></i>Registrar Nuevo Producto
      </div>
      <div class="card-body p-4">
        <form method="POST" action="{{ url_for('registrar') }}">

          <div class="mb-3">
            <label class="form-label fw-bold">Nombre del Producto</label>
            <div class="input-group">
              <span class="input-group-text bg-primary text-white"><i class="bi bi-tag-fill"></i></span>
              <input type="text" name="nombre" class="form-control" placeholder="ej. Laptop Dell XPS 15" required>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">Categoría</label>
            <select name="categoria" class="form-select">
              <option value="Laptops">💻 Laptops</option>
              <option value="Smartphones">📱 Smartphones</option>
              <option value="Accesorios">🎧 Accesorios</option>
              <option value="Monitores">🖥️ Monitores</option>
              <option value="Componentes">🔧 Componentes</option>
              <option value="Periféricos">🖱️ Periféricos</option>
              <option value="Otro">📦 Otro</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">Precio (USD)</label>
            <div class="input-group">
              <span class="input-group-text bg-success text-white"><i class="bi bi-currency-dollar"></i></span>
              <input type="number" name="precio" class="form-control" step="0.01" min="0" placeholder="0.00" required>
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label fw-bold">Cantidad en Stock</label>
            <div class="input-group">
              <span class="input-group-text bg-dark text-white"><i class="bi bi-boxes"></i></span>
              <input type="number" name="stock" class="form-control" min="0" placeholder="0" required>
            </div>
          </div>

          <div class="d-flex gap-3">
            <button type="submit" class="btn btn-primary fw-bold flex-fill">
              <i class="bi bi-check-circle me-1"></i>Guardar Producto
            </button>
            <a href="{{ url_for('listar') }}" class="btn btn-outline-secondary fw-bold flex-fill text-center">
              <i class="bi bi-arrow-left me-1"></i>Volver
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
